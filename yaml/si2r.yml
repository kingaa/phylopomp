name: SI2R
description: Two-deme model of superspreading
details: |-
  Deme L consists of "low-rate spreaders" that transmit at rate \\code{Beta}.
  Deme H consists of "superspreaders" who transmit at a higher rate
  \\code{kappa*Beta}.
demes: [L, H]
parameter:
  Beta:
    name: Beta
    description: transmission rate
    type: double
    default: 5
  kappa:
    name: kappa
    description: super-spreading transmission factor
    type: double
    default: 2
  gamma:
    name: gamma
    description: recovery rate
    type: double
    default: 1
  omega:
    name: omega
    description: rate of waning of immunity
    default: 0
    type: double
  psi:
    name: psi
    description: sampling rate
    default: 1
    type: double
  etaL:
    name: etaL
    description: |-
      rate of transition from low-spreading to
      super-spreading behavior
    default: 1
    type: double
  etaH:
    name: etaH
    description: |-
      rate of transition from super-spreading to
      low-spreading behavior
    default: 3
    type: double
ivp:
  pop:
    name: pop
    description: population size
    type: double
    default: 500
  S0:
    name: S0
    description: initial size of susceptible population
    default: 0.98
    type: double
  IL0:
    name: IL0
    description: initial size of low-spreading population
    default: 0.02
    type: double
  IH0:
    name: IH0
    description: initial size of super-spreading population
    default: 0
    type: double
  R0:
    name: R0
    description: initial size of immune population
    default: 0
    type: double
state:
  S:
    name: S
    type: int
  IL:
    name: IL
    type: int
  IH:
    name: IH
    type: int
  R:
    name: R
    type: int
rinit: |-
  double f = params.pop/(params.S0+params.IL0+params.IH0+params.R0);
  state.S = int(f*params.S0);
  state.IL = int(f*params.IL0);
  state.IH = int(f*params.IH0);
  state.R = int(f*params.R0);
  graft(L,state.IL);
  graft(H,state.IH);
events:
  TL:
    rate: params.Beta * state.S * state.IL / params.pop
    jump: state.S -= 1; state.IL += 1; birth(L,L);
  TH:
    rate: params.kappa * params.Beta * state.S * state.IH / params.pop
    jump: state.S -= 1; state.IL += 1; birth(H,L);
  L:
    jump: state.IL -= 1; state.IH += 1; migrate(L,H);
    rate: params.etaL * state.IL
  H:
    jump: state.IL += 1; state.IH -= 1; migrate(H,L);
    rate: params.etaH * state.IH
  RL:
    jump: state.IL -= 1; state.R += 1; death(L);
    rate: params.gamma * state.IL
  RH:
    jump: state.IH -= 1; state.R += 1; death(H);
    rate: params.gamma * state.IH
  W:
    jump: state.R -= 1; state.S += 1;
    rate: params.omega * state.R
  SL:
    rate: params.psi * state.IL
    jump: sample(L);
  SH:
    rate: params.psi * state.IH
    jump: sample(H);
